plugins {
    id 'java'
    id 'java-library' // SHADOW
    id "com.github.johnrengelman.shadow" version "7.1.2" // SHADOW
}

group 'net.lucynetwork.chatmanager'
version '1.0.0'

repositories {
    mavenCentral()
    maven {
        url = "http://idkNicks.xyz:8081/repository/maven-public/"
        allowInsecureProtocol = true
    }
    maven { url = 'https://repo.extendedclip.com/content/repositories/placeholderapi/' }
}

dependencies {

    // DEPENDENCIES
    implementation "org.jetbrains:annotations:23.0.0"
    compileOnly "org.projectlombok:lombok:1.18.24"
    annotationProcessor "org.projectlombok:lombok:1.18.24"

    // LUCY CORE
    compileOnly "net.lucynetwork:lucycore:1.0.0"

    // BUKKIT API
    compileOnly "org.bukkit.spigotmc:spigot-api:1.19.2-R0.1"

    // OTHERS
    compileOnly "me.clip:placeholderapi:2.11.2"
    api "net.dv8tion:JDA:5.0.0-alpha.22"
    api "club.minnced:discord-webhooks:0.8.2"

}

jar {
    destinationDirectory.set(file('E:\\테스트용 1.19.2\\plugins'))
}